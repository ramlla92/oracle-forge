# mcp/tools.yaml
# Oracle Forge — MCP toolbox canonical 4-DB configuration for TRP1 deliverables
#
# NOTE:
# - This file intentionally keeps the full four-database shape expected in challenge docs.
# - Runtime in this repo currently uses mcp/mcp_server.py for /v1/tools compatibility.

sources:
  postgres_yelp:
    kind: "postgres"
    host: "127.0.0.1"
    port: 5432
    database: "yelp"
    user: "${POSTGRES_USER}"
    password: "${POSTGRES_PASSWORD}"

  mongo_yelp:
    kind: "mongodb"
    uri: "mongodb://127.0.0.1:27017"
    database: "yelp_db"

  sqlite_dab:
    kind: "sqlite"
    db_path: "/home/yakob/oracle-forge/DataAgentBench/query_bookreview/query_dataset/review_query.db"

  duckdb_dab:
    kind: "duckdb"
    db_path: "/home/yakob/oracle-forge/DataAgentBench/query_yelp/query_dataset/yelp_user.db"

tools:
  postgres_query:
    kind: "postgres-sql"
    source: "postgres_yelp"
    description: >
      Executes a SQL query against PostgreSQL Yelp tables.
    parameters:
      sql:
        type: string
        description: "Valid PostgreSQL SQL query string."

  mongo_aggregate:
    kind: "mongodb-aggregate"
    source: "mongo_yelp"
    description: >
      Executes a MongoDB aggregation pipeline for yelp_db collections.
    parameters:
      collection:
        type: string
        description: "MongoDB collection name."
      pipeline:
        type: string
        description: "JSON-encoded MongoDB aggregation pipeline array."

  mongo_find:
    kind: "mongodb-find"
    source: "mongo_yelp"
    description: >
      Executes a MongoDB find query for yelp_db collections.
    parameters:
      collection:
        type: string
        description: "MongoDB collection name."
      filter:
        type: string
        description: "JSON-encoded MongoDB filter document."
      projection:
        type: string
        description: "JSON-encoded MongoDB projection document."

  sqlite_query:
    kind: "sqlite-sql"
    source: "sqlite_dab"
    description: >
      Executes a SQL query against the DAB SQLite database.
    parameters:
      sql:
        type: string
        description: "Valid SQLite SQL query string."

  duckdb_query:
    kind: "duckdb-sql"
    source: "duckdb_dab"
    description: >
      Executes analytical SQL against the DAB DuckDB database.
    parameters:
      sql:
        type: string
        description: "Valid DuckDB SQL query string."

  cross_db_merge:
    kind: "python-function"
    description: >
      Merges two result sets from different database tools using join keys.
    parameters:
      left_results:
        type: string
        description: "JSON-encoded result set from first tool."
      right_results:
        type: string
        description: "JSON-encoded result set from second tool."
      left_key:
        type: string
        description: "Join key in left result set."
      right_key:
        type: string
        description: "Join key in right result set."
      left_db:
        type: string
        description: "Database type for left result set."
      right_db:
        type: string
        description: "Database type for right result set."
